<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BitLogic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #030a0e;
    --grid: #0f2a35;
    --accent: #00ffe7;
    --text: #c8f0ff;
    --muted: #4a7a8a;
    --card-bg: rgba(0,255,231,0.04);
    --card-border: rgba(0,255,231,0.18);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 18s linear infinite;
    opacity: 0.6;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    width: min(420px, 92vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeIn 1s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    position: relative;
    width: 96px;
    height: 96px;
  }

  .logo-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--accent);
    box-shadow: 0 0 18px var(--accent), inset 0 0 18px rgba(0,255,231,0.08);
    animation: spin 8s linear infinite;
  }

  .logo-ring-2 {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px dashed rgba(0,255,231,0.3);
    animation: spin 5s linear infinite reverse;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .logo-inner {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #001a22, #003344);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent);
    letter-spacing: -1px;
  }

  .title {
    text-align: center;
  }

  .title h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,231,0.6), 0 0 60px rgba(0,255,231,0.2);
    letter-spacing: 4px;
    line-height: 1;
  }

  .title h1:hover {
    animation: glitch 0.3s linear;
  }

  @keyframes glitch {
    0%   { text-shadow: 0 0 20px rgba(0,255,231,0.6); }
    20%  { text-shadow: -2px 0 red, 2px 0 cyan; }
    40%  { text-shadow: 2px 0 blue, -2px 0 lime; }
    60%  { text-shadow: -2px 0 red, 2px 0 cyan; }
    80%  { text-shadow: 0 0 20px rgba(0,255,231,0.6); }
    100% { text-shadow: 0 0 20px rgba(0,255,231,0.6); }
  }

  .title .tagline {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title .tagline::after {
    content: '▮';
    animation: blink 1.1s step-end infinite;
    margin-left: 4px;
    color: var(--accent);
    opacity: 0.7;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0; }
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 16px 22px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s ease;
    transform-origin: center;
  }

  .link-btn:hover {
    border-color: var(--accent);
    background: rgba(0,255,231,0.07);
    box-shadow: 0 0 24px rgba(0,255,231,0.1);
    color: #fff;
  }

  .link-btn:hover::before {
    transform: scaleY(1);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,255,231,0.08);
    border: 1px solid rgba(0,255,231,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }

  .link-label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-name {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .link-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .link-arrow {
    color: var(--accent);
    opacity: 0.5;
    font-size: 18px;
    transition: opacity 0.2s, transform 0.2s;
  }

  .link-btn:hover .link-arrow {
    opacity: 1;
    transform: translateX(4px);
  }

  .footer {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="container">

  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-ring-2"></div>
    <div class="logo-inner">BL</div>
  </div>

  <div class="title">
    <h1>BITLOGIC</h1>
    <div class="tagline">// crypto market trends //</div>
  </div>

  <div class="divider"></div>

  <div class="links">

    <a class="link-btn" href="https://t.co/s5m4tQMzai" target="_blank" rel="noopener">
      <div class="link-icon">✈️</div>
      <div class="link-label">
        <span class="link-name">Telegram</span>
        <span class="link-sub">Join the channel</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="mailto:bitlogic.engine@gmail.com">
      <div class="link-icon">✉️</div>
      <div class="link-label">
        <span class="link-name">Email</span>
        <span class="link-sub">bitlogic.engine@gmail.com</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://bitlogicalpha.com/" target="_blank" rel="noopener">
      <div class="link-icon">🌐</div>
      <div class="link-label">
        <span class="link-name">Website</span>
        <span class="link-sub">bitlogicalpha.com</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

  </div>

  <div class="divider"></div>

  <div class="footer">© 2026 BitLogic · All systems operational</div>

</div>
</body>
</html>
