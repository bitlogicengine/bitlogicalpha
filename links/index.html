<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BitLogic — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --surface:#0f0f0f;
  --surface2:#161616;
  --gold:#c9a84c;
  --gold-light:#e8c97a;
  --gold-dim:rgba(201,168,76,0.08);
  --gold-border:rgba(201,168,76,0.2);
  --text:#f0ece4;
  --text-muted:#6b6560;
  --text-dim:#3a3530;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.4;
}

html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'DM Mono',monospace;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.container{
  position:relative;z-index:1;
  width:min(480px,100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  animation:fadeUp 0.7s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* BRAND */
.brand-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  margin-bottom:48px;
  animation:fadeUp 0.7s ease 0.05s both;
}

.brand-mark{
  width:64px;height:64px;
  border-radius:50%;
  border:1.5px solid var(--gold);
  box-shadow:0 0 14px rgba(201,168,76,0.4),0 0 32px rgba(201,168,76,0.15),inset 0 0 14px rgba(201,168,76,0.05);
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 40% 40%,#1a1400,#080808);
  position:relative;
  flex-shrink:0;
}

.brand-name{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;
  color:var(--text);
  letter-spacing:3px;
  text-align:center;
}

.brand-tag{
  font-size:9px;
  color:var(--text-muted);
  letter-spacing:4px;
  text-transform:uppercase;
  text-align:center;
  margin-top:-8px;
}

/* DIVIDER */
.divider{
  width:100%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-border),transparent);
  margin-bottom:40px;
  animation:fadeUp 0.7s ease 0.1s both;
}

/* LINKS */
.links{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:2px;
  margin-bottom:48px;
}

.link-btn{
  display:flex;
  align-items:center;
  gap:18px;
  width:100%;
  padding:20px 24px;
  background:var(--surface);
  border:none;
  border-left:2px solid transparent;
  text-decoration:none;
  color:var(--text);
  font-family:'DM Mono',monospace;
  transition:background 0.2s,border-color 0.2s;
  animation:fadeUp 0.7s ease both;
}
.link-btn:nth-child(1){animation-delay:0.15s}
.link-btn:nth-child(2){animation-delay:0.22s}
.link-btn:nth-child(3){animation-delay:0.29s}

.link-btn:hover{
  background:var(--surface2);
  border-left-color:var(--gold);
}

.link-icon{
  width:38px;height:38px;
  border:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  flex-shrink:0;
  background:var(--gold-dim);
}

.link-label{flex:1}

.link-name{
  font-size:11px;
  color:var(--gold);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:3px;
}

.link-sub{
  font-size:10px;
  color:var(--text-muted);
  letter-spacing:1px;
}

.link-arrow{
  font-size:14px;
  color:var(--gold);
  opacity:0.3;
  transition:opacity 0.2s,transform 0.2s;
  font-family:'DM Mono',monospace;
}

.link-btn:hover .link-arrow{
  opacity:0.8;
  transform:translateX(4px);
}

/* FOOTER */
.footer{
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-transform:uppercase;
  text-align:center;
  animation:fadeUp 0.7s ease 0.4s both;
}
</style>
</head>
