<!DOCTYPE html>
<html>
<head>
<script>
  const path = window.location.pathname;
  if(path.startsWith('/news/')){
    // Keep the full URL and load the news page
    sessionStorage.setItem('newsRedirect', path);
    window.location.replace('/news/');
  } else {
    window.location.replace('/');
  }
</script>
</head>
</html>
