<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BitLogic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030a0e;--grid:#0f2a35;--accent:#00ffe7;--text:#c8f0ff;--muted:#4a7a8a;
  --card:#0a1a20;--card-border:rgba(0,255,231,0.15);--red:#ff4b4b;--green:#00e676;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--text)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 18s linear infinite;opacity:0.4;z-index:0;pointer-events:none}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1}

.wrapper{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:24px 16px 48px}

header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 32px;border-bottom:1px solid var(--card-border);margin-bottom:32px}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-circle{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--accent);text-shadow:0 0 8px var(--accent);flex-shrink:0;animation:spin 10s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--accent);text-shadow:0 0 16px rgba(0,255,231,0.5);letter-spacing:3px}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:3px;margin-top:2px}

.section{margin-bottom:40px}
.section-title{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0.3}

.coin-tabs{display:flex;gap:8px;margin-bottom:16px}
.coin-tab{padding:6px 16px;border:1px solid var(--card-border);border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;color:var(--muted)}
.coin-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,231,0.06)}

.screenshots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px}
.screenshot-card{background:var(--card);border:1px solid var(--card-border);border-radius:6px;overflow:hidden;position:relative;transition:border-color 0.25s,box-shadow 0.25s;cursor:zoom-in}
.screenshot-card:hover{border-color:var(--accent);box-shadow:0 0 32px rgba(0,255,231,0.10)}
.screenshot-img-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden}
.screenshot-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
.screenshot-card:hover img{transform:scale(1.04)}
.screenshot-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,10,14,0.85) 0%,transparent 50%);display:flex;align-items:flex-end;padding:14px 16px;opacity:0;transition:opacity 0.3s}
.screenshot-card:hover .screenshot-overlay{opacity:1}
.screenshot-overlay-text{font-size:11px;color:var(--accent);letter-spacing:2px}
.screenshot-zoom-icon{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,255,231,0.12);border:1px solid rgba(0,255,231,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transition:opacity 0.3s}
.screenshot-card:hover .screenshot-zoom-icon{opacity:1}
.screenshot-info{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--card-border)}
.screenshot-coin{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:3px}
.screenshot-date{font-size:10px;color:var(--muted);letter-spacing:1px}
.empty-state{color:var(--muted);font-size:12px;letter-spacing:2px;padding:32px;text-align:center;border:1px solid var(--card-border);border-radius:4px}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:94vw;max-height:90vh;border:1px solid var(--card-border);border-radius:6px;box-shadow:0 0 60px rgba(0,255,231,0.1)}
.lightbox-close{position:fixed;top:20px;right:28px;font-size:28px;color:var(--accent);cursor:pointer;font-family:'Share Tech Mono',monospace;background:none;border:none;line-height:1}

.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.coin-card{background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:14px 16px;transition:border-color 0.2s}
.coin-card:hover{border-color:var(--accent)}
.coin-rank{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px}
.coin-name{font-size:13px;color:var(--text);letter-spacing:1px;margin-bottom:2px}
.coin-symbol{font-size:10px;color:var(--muted)}
.coin-price{font-size:16px;color:var(--accent);margin:8px 0 4px;font-weight:bold}
.coin-change{font-size:12px;letter-spacing:1px}
.coin-cap{font-size:10px;color:var(--muted);margin-top:4px}
.up{color:var(--green)}.down{color:var(--red)}
.loading{color:var(--muted);font-size:12px;letter-spacing:2px;padding:20px;text-align:center}

.news-list{display:flex;flex-direction:column;gap:10px}
.news-item{background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color 0.2s}
.news-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0.6}
.news-item:hover{border-color:var(--accent)}
.news-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px}
.news-item-title{font-size:13px;color:var(--accent);letter-spacing:1px;line-height:1.4;font-weight:bold}
.news-item-date{font-size:10px;color:var(--muted);letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.news-item-body{font-size:12px;color:var(--text);line-height:1.7;letter-spacing:0.3px}
.news-item-url{display:inline-block;margin-top:8px;font-size:10px;color:var(--accent);letter-spacing:1px;text-decoration:none;opacity:0.7;transition:opacity 0.2s}
.news-item-url:hover{opacity:1}
.empty-news{color:var(--muted);font-size:12px;letter-spacing:2px;padding:24px;text-align:center;border:1px solid var(--card-border);border-radius:4px}

footer{border-top:1px solid var(--card-border);margin-top:40px;padding-top:16px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:2px}
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="chart"/>
</div>

<div class="wrapper">

  <header>
    <div class="logo-area">
      <div class="logo-circle">BL</div>
      <div>
        <div class="logo-text">BITLOGIC</div>
        <div class="logo-sub">// crypto market trends //</div>
      </div>
    </div>
  </header>

  <div class="section">
    <div class="section-title">Chart Analysis</div>
    <div class="coin-tabs">
      <div class="coin-tab active" id="viewTabBTC" onclick="switchView('BTC')">BTC</div>
      <div class="coin-tab" id="viewTabETH" onclick="switchView('ETH')">ETH</div>
    </div>
    <div id="screenshotsContainer">
      <div class="loading">Loading charts...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Top 5 by Market Cap</div>
    <div id="marketGrid" class="market-grid">
      <div class="loading">Fetching live data...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">BitLogic News</div>
    <div id="newsList" class="news-list">
      <div class="loading">Loading news...</div>
    </div>
  </div>

  <footer>© 2026 BitLogic · All systems operational · bitlogicalpha.com</footer>
</div>

<script>
const BASE = 'https://bitlogicengine.github.io/bitlogicalpha';
let viewCoin = 'BTC';
let allCharts = { BTC: [], ETH: [] };

function switchView(c){
  viewCoin = c;
  document.getElementById('viewTabBTC').classList.toggle('active', c==='BTC');
  document.getElementById('viewTabETH').classList.toggle('active', c==='ETH');
  renderScreenshots();
}

function openLightbox(src){ document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightboxImg').src=''; }

async function fetchCharts(){
  const el = document.getElementById('screenshotsContainer');
  try {
    const [btcRes, ethRes] = await Promise.all([
      fetch(`${BASE}/charts/BTC/manifest.txt?t=${Date.now()}`).then(r => r.ok ? r.text() : ''),
      fetch(`${BASE}/charts/ETH/manifest.txt?t=${Date.now()}`).then(r => r.ok ? r.text() : '')
    ]);
    allCharts.BTC = btcRes.split('\n').map(l=>l.trim()).filter(l=>l.length>0).map(f=>({
      src: `${BASE}/charts/BTC/${f}`,
      name: f
    }));
    allCharts.ETH = ethRes.split('\n').map(l=>l.trim()).filter(l=>l.length>0).map(f=>({
      src: `${BASE}/charts/ETH/${f}`,
      name: f
    }));
    renderScreenshots();
  } catch(e){
    el.innerHTML = '<div class="empty-state">// Could not load charts //</div>';
  }
}

function renderScreenshots(){
  const charts = allCharts[viewCoin];
  const c = document.getElementById('screenshotsContainer');
  if(!charts.length){
    c.innerHTML = `<div class="empty-state">No ${viewCoin} charts uploaded yet.</div>`;
    return;
  }
  c.innerHTML = '<div class="screenshots-grid">' + charts.map(ch => {
    const dateMatch = ch.name.match(/(\d{4}-\d{2}-\d{2})/);
    const dateStr = dateMatch
      ? new Date(dateMatch[1]).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
      : ch.name.replace(/\.[^.]+$/,'');
    return `<div class="screenshot-card" onclick="openLightbox('${ch.src}')">
      <div class="screenshot-img-wrap">
        <img src="${ch.src}" alt="${viewCoin} chart"/>
        <div class="screenshot-overlay"><span class="screenshot-overlay-text">Click to expand</span></div>
        <div class="screenshot-zoom-icon">🔍</div>
      </div>
      <div class="screenshot-info">
        <span class="screenshot-coin">${viewCoin} / USD</span>
        <span class="screenshot-date">${dateStr}</span>
      </div>
    </div>`;
  }).join('') + '</div>';
}

async function fetchNews(){
  const el = document.getElementById('newsList');
  try {
    const res = await fetch(`${BASE}/news.json?t=${Date.now()}`);
    if(!res.ok) throw new Error();
    const items = await res.json();
    if(!items.length){ el.innerHTML='<div class="empty-news">No updates posted yet.</div>'; return; }
    el.innerHTML = items.map(n => `
      <div class="news-item">
        <div class="news-item-header">
          <div class="news-item-title">${n.title||''}</div>
          <div class="news-item-date">${n.date||''}</div>
        </div>
        ${n.body ? `<div class="news-item-body">${n.body}</div>` : ''}
        ${n.url  ? `<a class="news-item-url" href="${n.url}" target="_blank" rel="noopener">→ Read more</a>` : ''}
      </div>`).join('');
  } catch(e){
    el.innerHTML = '<div class="empty-news">No updates posted yet.</div>';
  }
}

async function fetchMarket(){
  try{
    const data = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=5&page=1&sparkline=false').then(r=>r.json());
    document.getElementById('marketGrid').innerHTML = data.map((c,i)=>{
      const up = c.price_change_percentage_24h >= 0;
      return `<div class="coin-card">
        <div class="coin-rank">#${i+1}</div>
        <div class="coin-name">${c.name}</div>
        <div class="coin-symbol">${c.symbol.toUpperCase()}</div>
        <div class="coin-price">$${c.current_price.toLocaleString()}</div>
        <div class="coin-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(c.price_change_percentage_24h).toFixed(2)}%</div>
        <div class="coin-cap">MCap: $${(c.market_cap/1e9).toFixed(1)}B</div>
      </div>`;
    }).join('');
  } catch(e){ document.getElementById('marketGrid').innerHTML='<div class="loading">// Unable to fetch data //</div>'; }
}

fetchCharts();
fetchNews();
fetchMarket();
setInterval(fetchMarket, 60000);
</script>
</body>
</html>
