<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#0f0f0f;--surface2:#161616;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.2);
  --text:#f0ece4;--text-muted:#6b6560;--text-dim:#3a3530;
  --red:#e05555;--green:#4caf7d;
}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);line-height:1.6}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.5;
}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px 80px}

/* HEADER & STICKY NAV */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;
  animation:fadeUp 0.6s ease both;
}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer}
.sticky-nav{
  position:sticky;
  top:0;
  z-index:500;
  background:rgba(8,8,8,0.98); /* Solidified for better legibility on scroll */
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--text-dim);
}
.sticky-nav header{ padding:16px 24px; max-width:1100px; margin:0 auto; border-bottom:none; }
.sticky-nav .nav-tabs{ border-top:1px solid rgba(58,53,48,0.5); padding:0 24px; max-width:1100px; margin:0 auto; }

.brand-mark{
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid var(--gold);
  box-shadow:0 0 12px rgba(201,168,76,0.4),0 0 28px rgba(201,168,76,0.15);
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 40% 40%,#1a1400,#080808);flex-shrink:0;
}
.brand-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:2px}
.brand-tag{font-size:9px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.nav-date{font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase}

/* NAV TABS */
.nav-tabs{ display:flex; gap:0; border-bottom:1px solid var(--text-dim); margin-bottom:64px; margin-top:24px; }
.nav-tab{
  padding:12px 28px; font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; border:none; background:transparent; transition:all 0.2s;
  border-bottom:2px solid transparent; font-family:'DM Mono',monospace;
}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* VIEWS */
.view{display:none}
.view.active{display:block;animation:fadeUp 0.4s ease both}

/* TICKER */
.ticker-wrap{ overflow:hidden; border-top:1px solid var(--text-dim); border-bottom:1px solid var(--text-dim); padding:10px 0; margin-bottom:64px; }
.ticker-track{display:flex;gap:48px;white-space:nowrap;animation:ticker 30s linear infinite}
.ticker-item{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* SECTION */
.section{margin-bottom:72px}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--text-dim)}
.section-label{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.section-meta{font-size:9px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase}

/* GRID LAYOUTS */
.trend-widget{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.market-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.learn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:20px}

/* CARDS */
.coin-card, .learn-card, .sentiment-card{background:var(--surface);padding:20px 18px;border-left:2px solid transparent;transition:all 0.2s}
.coin-card:hover{background:var(--surface2);border-left-color:var(--gold)}
.coin-price{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);margin:12px 0 6px}
.up{color:var(--green)}.down{color:var(--red)}

/* TREND CARDS */
.trend-card{ background:var(--surface); padding:32px 28px; border-left:3px solid transparent; position:relative; overflow:hidden; }
.trend-card.positive{border-left-color:#4caf7d}.trend-card.negative{border-left-color:#e05555}.trend-card.neutral{border-left-color:#c9a84c}
.trend-price{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:4px}

/* SKELETON LOADERS */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skeleton{ background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:600px 100%; animation:shimmer 1.6s infinite linear; }

/* JUMP BARS & TOC */
.jump-bar{ display:flex; overflow-x:auto; white-space:nowrap; background:var(--surface); border:1px solid var(--text-dim); margin-bottom:32px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.jump-link{ padding:10px 16px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); cursor:pointer; border-right:1px solid var(--text-dim); flex:0 0 auto; text-decoration:none; }

.toc-nav{ background:var(--surface); border-left:3px solid var(--gold); padding:20px 24px; margin-bottom:40px; }
.toc-links{ display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; }
.toc-link{ background:var(--surface2); padding:12px 16px; border:1px solid var(--text-dim); text-decoration:none; flex:0 0 auto; min-width:150px; }

/* MOBILE RESPONSIVE FIXES */
@media (max-width: 768px) {
  .page { padding: 20px 16px 60px; }
  header { padding: 10px 0; }
  .brand-mark { width: 38px; height: 38px; }
  .brand-name { font-size: 16px; letter-spacing: 1px; }
  .brand-tag { font-size: 8px; }
  .nav-date { display: none; }
  
  .nav-tabs { overflow-x: auto; white-space: nowrap; margin-bottom: 32px; border-bottom: 1px solid var(--text-dim); }
  .nav-tab { padding: 10px 16px; }

  .trend-widget, .perf-grid, .learn-grid, .charts-grid { grid-template-columns: 1fr !important; gap: 8px; }
  .market-grid { grid-template-columns: repeat(2, 1fr); }
  
  .section { margin-bottom: 48px; }
  .section-label { font-size: 18px; }
  .fg-large, .dominance-wrap { flex-direction: column; text-align: center; padding: 20px 16px; }
  
  .btc-hero { padding: 24px 20px; }
  .btc-hero-title { font-size: 24px; }
  .btc-card-grid { grid-template-columns: 1fr !important; }
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="sticky-nav">
  <header>
    <div class="brand" onclick="switchTab('home')">
      <div class="brand-mark"><span style="font-size:16px;font-weight:900;color:var(--gold);font-family:'Playfair Display',serif;">₿L</span></div>
      <div>
        <div class="brand-name">BITLOGIC <span style="color:var(--gold);font-size:16px;letter-spacing:3px">ALPHA</span></div>
        <div class="brand-tag">Crypto & Gold Intelligence</div>
      </div>
    </div>
    <div class="nav-date" id="navDate"></div>
  </header>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-home" onclick="switchTab('home')">Home</button>
    <button class="nav-tab" id="tab-insights" onclick="switchTab('insights')">Insights</button>
    <button class="nav-tab" id="tab-bitcoin" onclick="switchTab('bitcoin')">Bitcoin</button>
    <button class="nav-tab" id="tab-alts" onclick="switchTab('alts')">Alts</button>
    <button class="nav-tab" id="tab-resources" onclick="switchTab('resources')">Resources</button>
    <button class="nav-tab" id="tab-about" onclick="switchTab('about')">About</button>
  </div>
</div>

<div class="page">
  <div class="view active" id="view-home">
    <div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"><span class="ticker-item">Loading data...</span></div></div>

    <nav class="toc-nav">
      <div class="toc-links">
        <a class="toc-link" href="#sec-market-state" onclick="jumpTo('sec-market-state')"><span class="toc-title">Daily State</span></a>
        <a class="toc-link" href="#sec-latest-news" onclick="jumpTo('sec-latest-news')"><span class="toc-title">News Alerts</span></a>
        <a class="toc-link" href="#sec-market-overview" onclick="jumpTo('sec-market-overview')"><span class="toc-title">Overview</span></a>
        <a class="toc-link" onclick="switchTab('bitcoin');jumpTo('btc-protocol')"><span class="toc-title">Learn 101</span></a>
      </div>
    </nav>

    <div class="section" id="sec-market-state">
      <div class="section-header"><div class="section-label">Daily Market State</div><div class="section-meta">Updated Daily</div></div>
      <div id="trendWidget" class="trend-widget">
        <div class="skeleton" style="height:140px"></div>
        <div class="skeleton" style="height:140px"></div>
        <div class="skeleton" style="height:140px"></div>
      </div>
    </div>

    <div class="section" id="sec-market-overview">
      <div class="section-header"><div class="section-label">Market Overview</div><div class="section-meta">Top 5 · Live</div></div>
      <div id="marketGrid" class="market-grid">
        <div class="skeleton" style="height:110px"></div>
        <div class="skeleton" style="height:110px"></div>
      </div>
    </div>
  </div>

  </div>

<script>
const BASE = 'https://bitlogicalpha.com';
let cachedMarketData = [];

// TECHNICAL FIX: Removed the blocking loop. Now price is injected reactively.
async function fetchTrend(){
  const el = document.getElementById('trendWidget');
  try {
    const [btcRes, ethRes, goldRes] = await Promise.all([
      fetch(`${BASE}/charts/BTC/manifest.txt?t=${Date.now()}`).then(r=>r.text()),
      fetch(`${BASE}/charts/ETH/manifest.txt?t=${Date.now()}`).then(r=>r.text()),
      fetch(`${BASE}/charts/GOLD/manifest.txt?t=${Date.now()}`).then(r=>r.text())
    ]);

    function parse(txt){
      let obj = {status:'neutral', note:''};
      txt.split('\n').forEach(l=>{
        if(l.startsWith('status:')) obj.status = l.split(':')[1].trim().toLowerCase();
        if(l.startsWith('note:')) obj.note = l.substring(l.indexOf(':')+1).trim();
      });
      return obj;
    }

    const btc = parse(btcRes), eth = parse(ethRes), gold = parse(goldRes);
    
    // Immediate render with manifest data (Fastest for engagement)
    el.innerHTML = renderTrendCard('BTC', btc) + renderTrendCard('ETH', eth) + renderTrendCard('GOLD', gold);
    
    // Technical FIX: If prices are already loaded, update them immediately
    if(cachedMarketData.length) updateTrendPrices();

  } catch(e) { el.innerHTML = '<div class="loading">Data Unavailable</div>'; }
}

function renderTrendCard(coin, data){
  const colors = {positive:'#4caf7d', negative:'#e05555', neutral:'#c9a84c'};
  const color = colors[data.status] || colors.neutral;
  return `<div class="trend-card ${data.status}">
    <div style="font-size:9px; color:var(--text-muted)">${coin} / USD</div>
    <div class="trend-price" id="price-${coin}">---</div>
    <div style="color:${color}; font-weight:700; text-transform:uppercase">${data.status}</div>
    <div style="font-size:11px; margin-top:10px; color:var(--text-muted)">${data.note}</div>
  </div>`;
}

function updateTrendPrices(){
  const coins = {BTC:'bitcoin', ETH:'ethereum', GOLD:'pax-gold'};
  Object.entries(coins).forEach(([key, id]) => {
    const data = cachedMarketData.find(c => c.id === id);
    const el = document.getElementById(`price-${key}`);
    if(data && el) el.textContent = '$' + data.current_price.toLocaleString();
  });
}

async function fetchMarket(){
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,pax-gold&order=market_cap_desc&per_page=10&page=1&sparkline=false');
    const data = await res.json();
    cachedMarketData = data;
    updateTrendPrices();
    // Render Market Overview grid here...
  } catch(e) { console.error("Market data failed"); }
}

function switchTab(tab){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function jumpTo(id){
  const el = document.getElementById(id);
  if(el) window.scrollTo({top: el.offsetTop - 100, behavior:'smooth'});
}

// INIT
document.getElementById('navDate').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
fetchTrend();
fetchMarket();
setInterval(fetchMarket, 60000);
</script>
