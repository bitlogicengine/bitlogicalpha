<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BitLogic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030a0e;--grid:#0f2a35;--accent:#00ffe7;--text:#c8f0ff;--muted:#4a7a8a;
  --card:#0a1a20;--card-border:rgba(0,255,231,0.15);--red:#ff4b4b;--green:#00e676;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--text)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 18s linear infinite;opacity:0.4;z-index:0;pointer-events:none}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1}

.wrapper{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:24px 16px 48px}

header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 32px;border-bottom:1px solid var(--card-border);margin-bottom:32px}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-circle{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--accent);text-shadow:0 0 8px var(--accent);flex-shrink:0;animation:spin 10s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--accent);text-shadow:0 0 16px rgba(0,255,231,0.5);letter-spacing:3px}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:3px;margin-top:2px}
.admin-btn{background:transparent;border:1px solid var(--card-border);color:var(--muted);padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;border-radius:3px;transition:all 0.2s;display:none}
.admin-btn:hover{border-color:var(--accent);color:var(--accent)}
.admin-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,231,0.06)}

.section{margin-bottom:40px}
.section-title{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0.3}

.admin-panel{background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:20px;margin-bottom:32px;display:none}
.admin-panel.visible{display:block}
.admin-login{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.admin-input{background:rgba(0,255,231,0.04);border:1px solid var(--card-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 12px;border-radius:3px;outline:none;flex:1;min-width:160px}
.admin-input:focus{border-color:var(--accent)}
.btn{background:rgba(0,255,231,0.08);border:1px solid var(--card-border);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:8px 16px;cursor:pointer;border-radius:3px;transition:all 0.2s}
.btn:hover{background:rgba(0,255,231,0.14);border-color:var(--accent)}
.err{color:var(--red);font-size:11px;letter-spacing:1px;margin-top:8px}

.upload-area{border:1px dashed rgba(0,255,231,0.3);border-radius:4px;padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px}
.upload-area:hover{border-color:var(--accent);background:rgba(0,255,231,0.03)}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-label{font-size:12px;color:var(--muted);letter-spacing:2px}
.coin-tabs{display:flex;gap:8px;margin-bottom:12px}
.coin-tab{padding:6px 16px;border:1px solid var(--card-border);border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;color:var(--muted)}
.coin-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,231,0.06)}

.screenshots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.screenshot-card{background:var(--card);border:1px solid var(--card-border);border-radius:4px;overflow:hidden;position:relative}
.screenshot-card img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.screenshot-info{padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.screenshot-coin{font-size:11px;color:var(--accent);letter-spacing:2px}
.screenshot-date{font-size:10px;color:var(--muted)}
.delete-btn{position:absolute;top:6px;right:6px;background:rgba(255,75,75,0.15);border:1px solid var(--red);color:var(--red);font-size:10px;padding:2px 6px;border-radius:2px;cursor:pointer;display:none;font-family:'Share Tech Mono',monospace}
.screenshot-card:hover .delete-btn{display:block}
.empty-state{color:var(--muted);font-size:12px;letter-spacing:2px;padding:24px;text-align:center;border:1px solid var(--card-border);border-radius:4px}

.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.coin-card{background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:14px 16px;transition:border-color 0.2s}
.coin-card:hover{border-color:var(--accent)}
.coin-rank{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px}
.coin-name{font-size:13px;color:var(--text);letter-spacing:1px;margin-bottom:2px}
.coin-symbol{font-size:10px;color:var(--muted)}
.coin-price{font-size:16px;color:var(--accent);margin:8px 0 4px;font-weight:bold}
.coin-change{font-size:12px;letter-spacing:1px}
.coin-cap{font-size:10px;color:var(--muted);margin-top:4px}
.up{color:var(--green)}.down{color:var(--red)}
.loading{color:var(--muted);font-size:12px;letter-spacing:2px;padding:20px;text-align:center}

/* NEWS */
.news-list{display:flex;flex-direction:column;gap:10px}
.news-item{background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:14px 18px;display:flex;gap:14px;align-items:flex-start;text-decoration:none;transition:border-color 0.2s;position:relative;overflow:hidden}
.news-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s}
.news-item:hover{border-color:var(--accent)}
.news-item:hover::before{opacity:1}
.news-num{font-size:11px;color:var(--muted);width:22px;flex-shrink:0;padding-top:2px}
.news-body{flex:1}
.news-source-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:2px;background:rgba(0,255,231,0.08);border:1px solid rgba(0,255,231,0.2);color:var(--accent);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.news-title{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:4px;letter-spacing:0.3px}
.news-meta{font-size:10px;color:var(--muted);letter-spacing:1px}
.news-arrow{color:var(--accent);opacity:0.4;font-size:16px;align-self:center;transition:all 0.2s;flex-shrink:0}
.news-item:hover .news-arrow{opacity:1;transform:translateX(4px)}

footer{border-top:1px solid var(--card-border);margin-top:40px;padding-top:16px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:2px}
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-area">
      <div class="logo-circle">BL</div>
      <div>
        <div class="logo-text">BITLOGIC</div>
        <div class="logo-sub">// crypto market trends //</div>
      </div>
    </div>
    <button class="admin-btn" id="adminToggle" onclick="toggleAdminPanel()">[ ADMIN ]</button>
  </header>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel">
    <div id="loginSection">
      <div class="section-title">Admin Access</div>
      <div class="admin-login">
        <input class="admin-input" type="password" id="pwInput" placeholder="Enter password..." onkeydown="if(event.key==='Enter')login()"/>
        <button class="btn" onclick="login()">UNLOCK →</button>
      </div>
      <div class="err" id="loginErr"></div>
    </div>
    <div id="uploadSection" style="display:none">
      <div class="section-title">Upload Trend Screenshot</div>
      <div class="coin-tabs">
        <div class="coin-tab active" id="tabBTC" onclick="selectCoin('BTC')">BTC</div>
        <div class="coin-tab" id="tabETH" onclick="selectCoin('ETH')">ETH</div>
      </div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)" style="display:none"/>
        <div class="upload-icon">📸</div>
        <div class="upload-label">Click to upload screenshot</div>
      </div>
      <button class="btn" onclick="logout()" style="font-size:10px;opacity:0.6">LOCK SESSION</button>
    </div>
  </div>

  <!-- TREND SCREENSHOTS -->
  <div class="section">
    <div class="section-title">Trend Analysis</div>
    <div class="coin-tabs">
      <div class="coin-tab active" id="viewTabBTC" onclick="switchView('BTC')">BTC</div>
      <div class="coin-tab" id="viewTabETH" onclick="switchView('ETH')">ETH</div>
    </div>
    <div id="screenshotsContainer">
      <div class="empty-state">No screenshots uploaded yet.</div>
    </div>
  </div>

  <!-- TOP 5 MARKET CAP -->
  <div class="section">
    <div class="section-title">Top 5 by Market Cap</div>
    <div id="marketGrid" class="market-grid">
      <div class="loading">Fetching live data...</div>
    </div>
  </div>

  <!-- CRYPTO NEWS -->
  <div class="section">
    <div class="section-title">Latest Crypto News</div>
    <div id="newsList" class="news-list">
      <div class="loading">Loading news...</div>
    </div>
  </div>

  <footer>© 2026 BitLogic · All systems operational · bitlogic.com</footer>
</div>

<script>
const ADMIN_PASSWORD = 'bitlogic2026';
let isAdmin = false;
let selectedCoin = 'BTC';
let viewCoin = 'BTC';
let screenshots = JSON.parse(localStorage.getItem('bl_screenshots') || '[]');

const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('admin') === 'true') document.getElementById('adminToggle').style.display = 'block';

function saveScreenshots(){ localStorage.setItem('bl_screenshots', JSON.stringify(screenshots)); }
function toggleAdminPanel(){
  const p=document.getElementById('adminPanel'),b=document.getElementById('adminToggle');
  b.classList.toggle('active',p.classList.toggle('visible'));
}
function login(){
  if(document.getElementById('pwInput').value===ADMIN_PASSWORD){
    isAdmin=true;
    document.getElementById('loginSection').style.display='none';
    document.getElementById('uploadSection').style.display='block';
    document.getElementById('loginErr').textContent='';
    renderScreenshots();
  } else { document.getElementById('loginErr').textContent='// ACCESS DENIED //'; }
}
function logout(){
  isAdmin=false;
  document.getElementById('loginSection').style.display='block';
  document.getElementById('uploadSection').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('adminPanel').classList.remove('visible');
  document.getElementById('adminToggle').classList.remove('active');
  renderScreenshots();
}
function selectCoin(coin){
  selectedCoin=coin;
  document.getElementById('tabBTC').classList.toggle('active',coin==='BTC');
  document.getElementById('tabETH').classList.toggle('active',coin==='ETH');
}
function switchView(coin){
  viewCoin=coin;
  document.getElementById('viewTabBTC').classList.toggle('active',coin==='BTC');
  document.getElementById('viewTabETH').classList.toggle('active',coin==='ETH');
  renderScreenshots();
}
function handleUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    screenshots.unshift({coin:selectedCoin,src:ev.target.result,date:new Date().toLocaleDateString('en-GB')});
    saveScreenshots(); renderScreenshots();
  };
  reader.readAsDataURL(file); e.target.value='';
}
function deleteScreenshot(i){ screenshots.splice(i,1); saveScreenshots(); renderScreenshots(); }
function renderScreenshots(){
  const filtered=screenshots.map((s,i)=>({...s,idx:i})).filter(s=>s.coin===viewCoin);
  const c=document.getElementById('screenshotsContainer');
  if(!filtered.length){ c.innerHTML='<div class="empty-state">No '+viewCoin+' screenshots yet.</div>'; return; }
  c.innerHTML='<div class="screenshots-grid">'+filtered.map(s=>`
    <div class="screenshot-card">
      <img src="${s.src}" alt="${s.coin} trend"/>
      <div class="screenshot-info">
        <span class="screenshot-coin">${s.coin}</span>
        <span class="screenshot-date">${s.date}</span>
      </div>
      ${isAdmin?`<button class="delete-btn" onclick="deleteScreenshot(${s.idx})">✕</button>`:''}
    </div>`).join('')+'</div>';
}

async function fetchMarket(){
  try{
    const data=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=5&page=1&sparkline=false').then(r=>r.json());
    document.getElementById('marketGrid').innerHTML=data.map((c,i)=>{
      const up=c.price_change_percentage_24h>=0;
      return `<div class="coin-card">
        <div class="coin-rank">#${i+1}</div>
        <div class="coin-name">${c.name}</div>
        <div class="coin-symbol">${c.symbol.toUpperCase()}</div>
        <div class="coin-price">$${c.current_price.toLocaleString()}</div>
        <div class="coin-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(c.price_change_percentage_24h).toFixed(2)}%</div>
        <div class="coin-cap">MCap: $${(c.market_cap/1e9).toFixed(1)}B</div>
      </div>`;
    }).join('');
  } catch(e){ document.getElementById('marketGrid').innerHTML='<div class="loading">// Unable to fetch data //</div>'; }
}

function timeAgo(dateStr){
  const diff=Math.floor((Date.now()-new Date(dateStr))/1000);
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

const SOURCE_COLORS = {
  'CoinDesk':'#f7931a','Cointelegraph':'#00c6a0','Decrypt':'#e84142',
  'The Block':'#5b6bff','Bitcoin Magazine':'#ff9500','Blockworks':'#a855f7',
  'The Defiant':'#ec4899'
};

async function fetchNews(){
  const el=document.getElementById('newsList');
  try{
    const data=await fetch('https://free-crypto-news.vercel.app/api/news?limit=9').then(r=>r.json());
    const articles=data.articles||[];
    if(!articles.length) throw new Error('No articles');
    el.innerHTML=articles.map((a,i)=>{
      const color=SOURCE_COLORS[a.source]||'var(--accent)';
      return `<a class="news-item" href="${a.link}" target="_blank" rel="noopener">
        <div class="news-num">0${i+1}</div>
        <div class="news-body">
          <div class="news-source-badge" style="color:${color};border-color:${color}30;background:${color}12">${a.source||'Crypto'}</div>
          <div class="news-title">${a.title}</div>
          <div class="news-meta">${a.timeAgo||timeAgo(a.pubDate||'')}</div>
        </div>
        <div class="news-arrow">→</div>
      </a>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="loading">// News unavailable //</div>';
  }
}

renderScreenshots();
fetchMarket();
fetchNews();
setInterval(fetchMarket,60000);
setInterval(fetchNews,600000);
</script>
</body>
</html>
